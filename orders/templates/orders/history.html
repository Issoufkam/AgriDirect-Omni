<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Commandes | AgriDirect-CIV</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    
    <style>
        :root {
            --primary: #00E676;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1E293B;
            --muted: #64748B;
            --border: #E2E8F0;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        h1, h2 { font-family: 'Outfit'; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .back-link { text-decoration: none; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .order-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            transition: transform 0.2s;
        }

        .card-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px; margin-bottom: 16px; }
        .status-pill { font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 6px 12px; border-radius: 100px; }
        
        .status-delivered { background: #DCFCE7; color: #166534; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-escrow { background: #DBEAFE; color: #1E40AF; }

        .item-row { display: flex; gap: 20px; align-items: center; }
        .item-img { width: 80px; height: 80px; border-radius: 12px; background: #eee; object-fit: cover; }
        
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
        .item-meta { font-size: 14px; color: var(--muted); }

        .price-summary { text-align: right; }
        .total-price { font-size: 20px; font-weight: 700; color: var(--text); display: block; margin-top: 4px; }

        .actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f8fafc; }
        .btn { padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: #f1f5f9; }

        /* Review Modal */
        #review-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 450px; max-width: 90%; }
        .stars { display: flex; gap: 10px; font-size: 32px; color: #CBD5E1; cursor: pointer; margin: 20px 0; }
        .stars .active { color: #F59E0B; }
        textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-family: inherit; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <a href="/marketplace/" class="back-link"><ion-icon name="arrow-back-outline"></ion-icon> Boutique</a>
                <h1>Mes Commandes</h1>
            </div>
            <div style="text-align: right;">
                <p id="client-name" style="font-weight: 600; margin: 0;"></p>
                <span id="order-count" style="color: var(--muted); font-size: 14px;"></span>
            </div>
        </header>

        <div id="history-container">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal">
        <div class="modal-content">
            <h2>Noter votre commande</h2>
            <p id="review-product-name" style="color: var(--muted);"></p>
            
            <label style="font-size: 14px; font-weight: 600; display: block; margin-top: 20px;">Quelle note donnez-vous au produit ?</label>
            <div class="stars" id="product-stars">
                <ion-icon name="star" data-val="1"></ion-icon>
                <ion-icon name="star" data-val="2"></ion-icon>
                <ion-icon name="star" data-val="3"></ion-icon>
                <ion-icon name="star" data-val="4"></ion-icon>
                <ion-icon name="star" data-val="5"></ion-icon>
            </div>

            <textarea id="review-comment" rows="4" placeholder="Votre avis aide les autres agriculteurs et clients..."></textarea>
            
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="submitReview()">Envoyer l'avis</button>
                <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        let orders = [];
        let selectedOrderId = null;
        let selectedRating = 0;

        async function fetchHistory() {
            try {
                const response = await fetch('/api/orders/list/');
                const data = await response.json();
                orders = data.results;
                document.getElementById('order-count').innerText = `${orders.length} commande(s)`;
                renderHistory();
            } catch (err) { console.error(err); }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 80px; color: var(--muted);">Vous n\'avez pas encore passé de commande.</div>';
                return;
            }

            orders.forEach(o => {
                const date = new Date(o.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
                const statusClasses = {
                    'DELIVERED': 'status-delivered',
                    'PENDING': 'status-pending',
                    'ESCROWED': 'status-escrow',
                    'PAID': 'status-escrow'
                };
                const statusLabel = o.status_display || 'En cours';

                container.innerHTML += `
                    <div class="order-card">
                        <div class="card-header">
                            <span style="color: var(--muted); font-weight: 600;">Commande #${o.id} • ${date}</span>
                            <span class="status-pill ${statusClasses[o.status] || ''}">${statusLabel}</span>
                        </div>
                        <div class="item-row">
                            <img src="${o.product_image || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=200'}" class="item-img">
                            <div class="item-info">
                                <div class="item-name">${o.product_name}</div>
                                <div class="item-meta">
                                    Quantité: ${o.quantity} ${o.product_unit}<br>
                                    Producteur: ${o.producer_name}
                                </div>
                            </div>
                            <div class="price-summary">
                                <span style="font-size: 11px; color: var(--muted); text-transform: uppercase;">Total payé</span>
                                <span class="total-price">${Number(o.total_amount).toLocaleString()} FCFA</span>
                            </div>
                        </div>
                        <div class="actions">
                            ${o.status === 'DELIVERED' ? 
                                `<button class="btn btn-primary" onclick="openReview(${o.id}, '${o.product_name}')">Noter le produit</button>` : ''}
                            <button class="btn btn-outline" onclick="alert('Suivi en temps réel bientôt disponible !')">Suivre</button>
                        </div>
                    </div>
                `;
            });
        }

        // Review Logic
        function openReview(id, name) {
            selectedOrderId = id;
            selectedRating = 0;
            document.getElementById('review-product-name').innerText = name;
            document.getElementById('review-modal').style.display = 'flex';
            resetStars();
        }

        function closeModal() {
            document.getElementById('review-modal').style.display = 'none';
        }

        const stars = document.querySelectorAll('#product-stars ion-icon');
        stars.forEach(s => {
            s.addEventListener('click', () => {
                selectedRating = s.dataset.val;
                updateStars(selectedRating);
            });
        });

        function updateStars(val) {
            stars.forEach(s => {
                if (s.dataset.val <= val) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        function resetStars() {
            stars.forEach(s => s.classList.remove('active'));
        }

        async function submitReview() {
            if (selectedRating === 0) return alert("Veuillez sélectionner une note.");
            
            const comment = document.getElementById('review-comment').value;

            try {
                const response = await fetch('/api/reviews/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        order: selectedOrderId,
                        target_type: 'PRODUIT',
                        rating: selectedRating,
                        comment: comment
                    })
                });

                if (response.status === 201) {
                    alert("Merci pour votre avis !");
                    closeModal();
                    fetchHistory();
                } else {
                    const data = await response.json();
                    alert("Erreur: " + (data.detail || "Vous avez déjà noté ce produit."));
                }
            } catch (err) { console.error(err); }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Init
        window.addEventListener('DOMContentLoaded', fetchHistory);

    </script>
</body>
</html>
